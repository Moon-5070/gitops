apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-echo
  labels:
    app: target-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: target-echo
  template:
    metadata:
      labels:
        app: target-echo
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:latest
          args:
            - "-text=target-only app deployed to cluster-2"
          ports:
            - containerPort: 5678
