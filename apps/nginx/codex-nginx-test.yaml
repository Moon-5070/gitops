apiVersion: apps/v1
kind: Deployment
metadata:
  name: codex-nginx-test
  namespace: default
  labels:
    app: codex-nginx-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codex-nginx-test
  template:
    metadata:
      labels:
        app: codex-nginx-test
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: codex-nginx-test
  namespace: default
  labels:
    app: codex-nginx-test
spec:
  type: ClusterIP
  selector:
    app: codex-nginx-test
  ports:
    - port: 80
      targetPort: 80
